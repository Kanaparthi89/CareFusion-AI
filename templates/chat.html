<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareFusion Medical Assistant</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <!-- External CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="chat-wrapper">
    <div class="chat-container">

        <!-- HEADER -->
        <div class="chat-header">
            <div class="chat-header-left">
                <div class="bot-avatar">
                    <img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png">
                </div>
                <div>
                    <div class="chat-title">CareFusion Medical Assistant</div>
                    <div class="chat-subtitle">Evidence‑based clinical responses</div>
                </div>
            </div>

            <div class="header-actions">
                <button id="darkToggle">Dark Mode</button>
            </div>
        </div>

        <!-- CHAT BODY -->
        <div id="chatBody" class="chat-body"></div>

        <!-- FOOTER -->
        <div class="chat-footer">
            <form id="messageForm">
                <div class="input-group-custom">
                    <input id="userInput" type="text" placeholder="Type your question..." required>
                    <button class="send-btn">Send</button>
                </div>
            </form>

            <div id="typingIndicator" class="typing-indicator">
                <div class="cf-loader"></div> CareFusion is thinking...
            </div>
        </div>

    </div>
</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>

<script>

/* -------------------------------
   APPEND MESSAGE
--------------------------------*/
function appendMessage(sender, text) {
    const safe = text.replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, "<br>");

    const html = `
        <div class="msg ${sender}">
            <div class="bubble">${safe}</div>
        </div>
    `;

    $("#chatBody").append(html);
    $("#chatBody").scrollTop($("#chatBody")[0].scrollHeight);
}

/* -------------------------------
   SEND MESSAGE
--------------------------------*/
$("#messageForm").on("submit", function(e) {
    e.preventDefault();

    const msg = $("#userInput").val().trim();
    if (!msg) return;

    appendMessage("user", msg);
    $("#userInput").val("");

    $("#typingIndicator").show();

    $.ajax({
        url: "/get",
        type: "POST",
        data: { msg }
    })
    .done(function(res) {
        $("#typingIndicator").hide();
        appendMessage("bot", res);
    })
    .fail(function(xhr, status) {
        $("#typingIndicator").hide();

        let errorMsg = "An unexpected error occurred.";

        if (status === "timeout") errorMsg = "The medical engine is taking too long.";
        else if (xhr.status === 500) errorMsg = "Internal medical engine error.";
        else if (xhr.status === 429) errorMsg = "Too many requests. Slow down.";
        else if (xhr.status === 0) errorMsg = "Network issue detected.";

        appendMessage("bot", errorMsg);
    });
});

/* -------------------------------
   DARK MODE
--------------------------------*/
const toggle = document.getElementById("darkToggle");

toggle.addEventListener("click", () => {
    document.body.classList.toggle("dark-mode");

    toggle.textContent =
        document.body.classList.contains("dark-mode")
        ? "Light Mode"
        : "Dark Mode";
});

</script>

</body>
</html>
